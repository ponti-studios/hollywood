info:
  name: Get Run
  type: http
  seq: 2
  tags:
    - runs

http:
  method: GET
  url: "{{baseUrl}}/v1/runs/:run_id"
  params:
    - name: run_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/runs/:run_id"
      method: GET
      params:
        - name: run_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "kind": "inference",
            "capability": "",
            "status": "pending",
            "model_id": "",
            "job_id": "",
            "experiment_id": "",
            "evaluation_id": "",
            "benchmark_id": "",
            "input": "",
            "output": "",
            "config": "",
            "metrics": "",
            "artifact_ids": [],
            "error": "",
            "started_at": "",
            "completed_at": "",
            "created_at": 0,
            "messages": "",
            "response": "",
            "prompt_tokens": "",
            "completion_tokens": "",
            "latency_ms": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/runs/:run_id"
      method: GET
      params:
        - name: run_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

info:
  name: Get Experiment
  type: http
  seq: 3
  tags:
    - experiments

http:
  method: GET
  url: "{{baseUrl}}/v1/experiments/:run_id"
  params:
    - name: run_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/experiments/:run_id"
      method: GET
      params:
        - name: run_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "status": "",
            "config_name": "",
            "phase": 0,
            "started_at": 0,
            "completed_at": "",
            "output_dir": "",
            "error": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/experiments/:run_id"
      method: GET
      params:
        - name: run_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

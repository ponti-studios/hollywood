info:
  name: List Experiments
  type: http
  seq: 2
  tags:
    - experiments

http:
  method: GET
  url: "{{baseUrl}}/v1/experiments"
  params:
    - name: capability
      value: ""
      type: query
      disabled: true
    - name: status
      value: ""
      type: query
      disabled: true
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/experiments"
      method: GET
      params:
        - name: capability
          value: ""
          type: query
          disabled: true
        - name: status
          value: ""
          type: query
          disabled: true
        - name: limit
          value: "100"
          type: query
        - name: offset
          value: "0"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "status": "",
              "config_name": "",
              "phase": 0,
              "started_at": 0,
              "completed_at": "",
              "output_dir": "",
              "error": ""
            }
          ]
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/experiments"
      method: GET
      params:
        - name: capability
          value: ""
          type: query
          disabled: true
        - name: status
          value: ""
          type: query
          disabled: true
        - name: limit
          value: "100"
          type: query
        - name: offset
          value: "0"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

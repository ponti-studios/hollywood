info:
  name: Asr
  type: http
  seq: 3
  tags:
    - audio

http:
  method: POST
  url: "{{baseUrl}}/v1/audio/transcribe"
  body:
    type: multipart-form
    data:
      - name: audio
        type: text
        value: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/audio/transcribe"
      method: POST
      body:
        type: multipart-form
        data:
          - name: audio
            type: text
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/audio/transcribe"
      method: POST
      body:
        type: multipart-form
        data:
          - name: audio
            type: text
            value: ""
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }

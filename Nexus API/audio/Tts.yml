info:
  name: Tts
  type: http
  seq: 2
  tags:
    - audio

http:
  method: POST
  url: "{{baseUrl}}/v1/audio/tts"
  body:
    type: json
    data: |-
      {
        "text": "",
        "voice": "",
        "instruct": "",
        "language": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/audio/tts"
      method: POST
      body:
        type: json
        data: |-
          {
            "text": "",
            "voice": "",
            "instruct": "",
            "language": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/audio/tts"
      method: POST
      body:
        type: json
        data: |-
          {
            "text": "",
            "voice": "",
            "instruct": "",
            "language": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

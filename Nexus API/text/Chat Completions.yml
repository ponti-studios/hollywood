info:
  name: Chat Completions
  type: http
  seq: 4
  tags:
    - text

http:
  method: POST
  url: "{{baseUrl}}/v1/text/chat/completions"
  body:
    type: json
    data: |-
      {
        "model": "",
        "messages": [
          {
            "role": "system",
            "content": ""
          }
        ],
        "max_tokens": 0,
        "temperature": 0,
        "stream": false,
        "stop": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/text/chat/completions"
      method: POST
      body:
        type: json
        data: |-
          {
            "model": "",
            "messages": [
              {
                "role": "system",
                "content": ""
              }
            ],
            "max_tokens": 0,
            "temperature": 0,
            "stream": false,
            "stop": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/text/chat/completions"
      method: POST
      body:
        type: json
        data: |-
          {
            "model": "",
            "messages": [
              {
                "role": "system",
                "content": ""
              }
            ],
            "max_tokens": 0,
            "temperature": 0,
            "stream": false,
            "stop": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

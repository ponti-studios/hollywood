info:
  name: Load Model
  type: http
  seq: 2
  tags:
    - text

http:
  method: POST
  url: "{{baseUrl}}/v1/models/load"
  body:
    type: json
    data: |-
      {
        "model_id": "",
        "quantize": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/v1/models/load"
      method: POST
      body:
        type: json
        data: |-
          {
            "model_id": "",
            "quantize": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/v1/models/load"
      method: POST
      body:
        type: json
        data: |-
          {
            "model_id": "",
            "quantize": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

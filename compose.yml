services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4.1-mini}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-4.1-mini}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_SPEECH_VOICE: ${OPENAI_SPEECH_VOICE:-alloy}
      NEXUS_AUDIO_DIR: ${NEXUS_AUDIO_DIR:-.data/audio}
    volumes:
      - ./.data:/app/.data
    command: ["python", "-m", "uvicorn", "nexus.api.app:app", "--host", "0.0.0.0", "--port", "8787"]

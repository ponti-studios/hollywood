services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_AUDIO_MODEL: ${GEMINI_AUDIO_MODEL:-gemini-2.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash}
      GEMINI_SPEECH_VOICE: ${GEMINI_SPEECH_VOICE:-Kore}
      NEXUS_AUDIO_DIR: ${NEXUS_AUDIO_DIR:-.data/audio}
    volumes:
      - ./.data:/app/.data
    command: ["python", "-m", "uvicorn", "nexus.api.app:app", "--host", "0.0.0.0", "--port", "8787"]

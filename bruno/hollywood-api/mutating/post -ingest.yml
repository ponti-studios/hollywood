info:
  name: post /ingest
  type: http
  seq: 11
  tags:
    - mutating

http:
  method: POST
  url: "{{baseUrl}}/ingest"
  body:
    type: multipart-form
    data:
      - key: file
        type: file
        value: .data/sample_emails/sample-email_1.eml
      - key: model
        type: text
        value: openai/gpt-4o-mini
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/ingest"
      method: POST
      body:
        type: multipart-form
        data:
          - key: file
            type: file
            value: .data/sample_emails/sample-email_1.eml
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "run_id": "",
            "model_name": "",
            "candidates": []
          }
  - name: 400 Response
    description: Missing file
    request:
      url: "{{baseUrl}}/ingest"
      method: POST
      body:
        type: multipart-form
        data: []
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""

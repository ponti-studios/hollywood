info:
  name: get /export
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/export"
  params:
    - name: table
      value: entities
      type: query
    - name: all
      value: "true"
      type: query
    - name: format
      value: parquet
      type: query
    - name: format
      value: jsonl
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Exported file paths
    request:
      url: "{{baseUrl}}/export"
      method: GET
      params:
        - name: table
          value: entities
          type: query
        - name: all
          value: "true"
          type: query
        - name: format
          value: parquet
          type: query
        - name: format
          value: jsonl
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "files": []
          }
  - name: 400 Response
    description: Pass ?all=true or ?table=<name>
    request:
      url: "{{baseUrl}}/export"
      method: GET
      params:
        - name: table
          value: entities
          type: query
        - name: all
          value: "true"
          type: query
        - name: format
          value: parquet
          type: query
        - name: format
          value: jsonl
          type: query
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Export failed
    request:
      url: "{{baseUrl}}/export"
      method: GET
      params:
        - name: table
          value: entities
          type: query
        - name: all
          value: "true"
          type: query
        - name: format
          value: parquet
          type: query
        - name: format
          value: jsonl
          type: query
          disabled: true
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

name: exp_01_baseline
description: >
  Phase 1 — Closed-book baseline.
  Runs the Gemma 4 E2B-it model on three benchmark types:
    - TriviaQA (knowledge-heavy: tests factual recall)
    - MMLU     (knowledge-heavy: tests broad academic knowledge)
    - Synthetic (pure logic: tests reasoning without memorisation)
  The contrast between Synthetic and the knowledge-heavy sets is the key finding.
phase: 1
models:
  - model_id: google/gemma-4-E2B-it
    role: small
    max_new_tokens: 128
    temperature: 0.0
    batch_size: 8


benchmarks:
  - name: triviaqa
    samples: 500 # 500 questions → ~15-20 min on Apple Silicon M-series
    seed: 42

  - name: mmlu
    samples: 500
    seed: 42
    mmlu_subjects: # 12 subjects — one per broad domain
      - high_school_mathematics
      - high_school_physics
      - college_computer_science
      - high_school_biology
      - high_school_us_history
      - philosophy
      - high_school_psychology
      - econometrics
      - professional_medicine
      - nutrition
      - logical_fallacies
      - machine_learning

  - name: synthetic
    samples: 500
    seed: 42

synthetic:
  depth_range: [2, 4] # 2-step to 4-step reasoning chains
  puzzle_types:
    - syllogism
    - conditional
    - negation
  vocab_size: 200

logging:
  wandb_project: "3b-logic-broker"
  output_dir: ".data/benchmarks/results"
  save_transcripts: true

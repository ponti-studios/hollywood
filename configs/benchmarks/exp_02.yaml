name: exp_02_open_book
description: >
  Phase 2 — Open-book benchmark.
  The Gemma 4 E2B-it model may issue search queries before answering.
  Cached reference results are retained for reproducibility when available.
phase: 2
models:
  - model_id: google/gemma-4-E2B-it
    role: small
    max_new_tokens: 128
    temperature: 0.0
    batch_size: 8


benchmarks:
  - name: triviaqa
    samples: 500
    seed: 42

  - name: mmlu
    samples: 500
    seed: 42
    mmlu_subjects:
      - high_school_mathematics
      - high_school_physics
      - college_computer_science
      - high_school_biology
      - high_school_us_history
      - philosophy
      - high_school_psychology
      - econometrics
      - professional_medicine
      - nutrition
      - logical_fallacies
      - machine_learning

logging:
  wandb_project: "3b-logic-broker"
  output_dir: ".data/benchmarks/results"
  save_transcripts: true
  reference_cache_dir: ".data/benchmarks/cache"
  use_reference_cache: true
  refresh_reference_cache: false

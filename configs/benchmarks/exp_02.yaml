name: exp_02_open_book
description: >
  Phase 2 — Open-book benchmark.
  The small model may issue search queries before answering.
  The optional large reference model remains closed-book and is primarily used
  as a cached comparison baseline.
phase: 2

models:
  - model_id: google/gemma-4-e2b
    role: small
    inference_backend: transformers
    max_new_tokens: 128
    temperature: 0.0
    batch_size: 8

  # Optional reference model.
  # - model_id: MiniMax-M2.7
  #   role: large
  #   inference_backend: openai-compatible
  #   api_base: https://api.minimax.io/v1
  #   api_key_env: MINIMAX_API_KEY
  #   max_new_tokens: 128
  #   temperature: 0.01
  #   batch_size: 1

benchmarks:
  - name: triviaqa
    samples: 500
    seed: 42

  - name: mmlu
    samples: 500
    seed: 42
    mmlu_subjects:
      - high_school_mathematics
      - high_school_physics
      - college_computer_science
      - high_school_biology
      - high_school_us_history
      - philosophy
      - high_school_psychology
      - econometrics
      - professional_medicine
      - nutrition
      - logical_fallacies
      - machine_learning

logging:
  wandb_project: "3b-logic-broker"
  output_dir: ".data/benchmarks/results"
  save_transcripts: true
  reference_cache_dir: ".data/benchmarks/cache"
  use_reference_cache: true
  refresh_reference_cache: false

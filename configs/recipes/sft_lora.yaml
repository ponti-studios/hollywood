# Recipe: SFT + LoRA on Gemma 4 E2B
#
# This is the recommended first experiment.
#
# What you'll learn:
#   - How to fine-tune a language model on instruction data
#   - How LoRA reduces memory and compute requirements
#   - How to read training curves (loss, learning rate, grad norm)
#   - How W&B experiment tracking works
#
# Expected results on Apple Silicon (M2 Pro, 16 GB):
#   - Training time: ~2-3 hours for 3 epochs on full Alpaca
#   - Final eval perplexity: ~15-25 (vs. ~30-40 for base model on Alpaca)
#   - The model will follow instructions noticeably better
#
# Quick test (change max_samples to run in ~10 minutes):
#   max_samples: 500
#   num_epochs: 1

name: "gemma4-e2b-sft-lora"
description: "SFT with LoRA adapters on Gemma 4 E2B using the Alpaca dataset."

model:
  model_id: "google/gemma-4-e2b"
  dtype: "bfloat16"
  max_seq_len: 2048
  attn_implementation: "eager"

# LoRA configuration — this is why we can train on a Mac
lora:
  r: 16               # rank: controls adapter expressiveness
                      # think of it as the "resolution" of the update
  alpha: 32           # scaling: usually 2× rank
  dropout: 0.05       # regularisation to prevent overfitting
  target_modules:
    - "q_proj"        # query attention projection
    - "k_proj"        # key attention projection
    - "v_proj"        # value attention projection
    - "o_proj"        # output projection
  bias: "none"

data:
  dataset_name: "tatsu-lab/alpaca"
  split: "train"
  val_split: 0.05
  max_samples: null   # change to 1000 for a quick smoke test
  seed: 42

training:
  method: "sft"
  learning_rate: 2.0e-4    # 2e-4 is a well-tested default for LoRA SFT
  num_epochs: 3
  batch_size: 2            # 2 fits on most Macs; reduce to 1 if you get OOM
  gradient_accumulation_steps: 8  # effective batch = 2 × 8 = 16
  warmup_ratio: 0.03       # ramp up LR for the first 3% of steps
  weight_decay: 0.01       # L2 regularisation
  output_dir: ".data/checkpoints/{name}"
  save_steps: 200
  logging_steps: 20
  eval_steps: 200
  max_grad_norm: 1.0

wandb:
  enabled: true
  project: "nexus-posttraining"
  tags: ["sft", "lora", "gemma4-e2b", "alpaca"]
  notes: "Baseline SFT + LoRA experiment"

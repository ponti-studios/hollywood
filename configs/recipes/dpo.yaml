# Recipe: DPO on Gemma 4 E2B
#
# What you'll learn:
#   - How preference learning differs from supervised fine-tuning
#   - How to interpret DPO-specific metrics (rewards/chosen, rewards/rejected,
#     rewards/accuracies, rewards/margins)
#   - The role of the β (beta) hyperparameter
#
# Prerequisites: ideally run sft_lora.yaml first, then point model_id at your
# SFT checkpoint. DPO starting from the instruction-tuned base also works.
#
# DPO-specific metrics to watch in W&B:
#   rewards/chosen   — log-probability ratio of chosen responses (should ↑)
#   rewards/rejected — log-probability ratio of rejected responses (should ↓)
#   rewards/accuracy — fraction of examples where chosen > rejected (should → 1.0)
#   rewards/margin   — gap between chosen and rejected rewards (should ↑)

name: "gemma4-e2b-it-dpo"
description: "DPO preference tuning on Gemma 4 E2B using UltraFeedback."

model:
  model_id: "google/gemma-4-E2B-it"
  # To continue from your SFT run, change to:
  # model_id: ".data/checkpoints/gemma4-e2b-it-sft-lora"
  dtype: "bfloat16"
  max_seq_len: 2048
  attn_implementation: "eager"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  bias: "none"

data:
  dataset_name: "trl-lib/ultrafeedback_binarized"
  split: "train"
  val_split: 0.05
  max_samples: null   # 61K examples; set to 5000 for quick test
  seed: 42

training:
  method: "dpo"
  learning_rate: 5.0e-5   # DPO typically uses lower LR than SFT
  num_epochs: 1            # DPO usually only needs 1-3 epochs
  batch_size: 1            # DPO is memory-intensive (needs to store chosen + rejected)
  gradient_accumulation_steps: 16
  warmup_ratio: 0.1
  weight_decay: 0.01
  output_dir: ".data/checkpoints/{name}"
  save_steps: 100
  logging_steps: 10
  eval_steps: 100
  max_grad_norm: 1.0

wandb:
  enabled: true
  project: "nexus-posttraining"
  tags: ["dpo", "lora", "gemma4-e2b-it", "ultrafeedback"]

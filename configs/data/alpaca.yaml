# Alpaca Dataset — for SFT experiments
#
# The Alpaca dataset (Taori et al., 2023) is the classic instruction-following
# benchmark. Stanford researchers used GPT-3.5 to generate 52K instruction/
# response pairs, then used them to fine-tune LLaMA.
#
# Format: {"instruction": "...", "input": "..." (optional), "output": "..."}
#
# It's a great starting point because:
#   - Small enough to train quickly on a Mac (52K examples)
#   - Well-understood — used in hundreds of papers
#   - Covers a wide variety of tasks (writing, QA, reasoning, code, etc.)
#
# Limitation: generated by GPT-3.5, so quality is variable. For production
# use, prefer HuggingFaceH4/ultrachat_200k (higher quality, curated).

dataset_name: "tatsu-lab/alpaca"
split: "train"
val_split: 0.05          # hold out 5% for validation
max_samples: null        # null = use all 52K examples
                         # for quick tests, set to 1000
seed: 42

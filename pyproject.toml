[project]
name = "nexus"
version = "0.1.0"
description = "Your terminal AI workbench"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Charles Ponti", email = "charles@example.com" }
]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "crawl4ai>=0.4.247",
    "langchain-openai>=0.1.23",
    "langchain>=0.2.16",
    "openai",
    "pydantic>=2.0",
    "pydantic-settings>=2.5.2",
    "python-dotenv",
    "tqdm>=4.64.1",
    "typer>=0.12.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.3",
    "pytest-cov>=6.0",
    "ruff>=0.6.4",
    "pyright>=1.1.0",
]

[project.scripts]
nexus = "nexus.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nexus"]
package-dir = { "nexus" = "src/nexus" }

[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["/usr/lib/*"]
src = ["src"]

[tool.ruff.lint]
ignore = [
    "E501", # line too long - will be fixed in format
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true


[tool.ruff.lint.isort]
combine-as-imports = true
force-wrap-aliases = true
known-local-folder = ["nexus"]
known-first-party = ["nexus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.pyright]
venvPath = "."
venv = ".venv"
exclude = ["**/__pycache__", "./typings"]
stubPath = "./typings"
typeCheckingMode = "strict"

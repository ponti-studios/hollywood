[project]
name = "nexus"
version = "0.1.0"
description = "Gemma 3 posttraining lab for Apple Silicon"
readme = "README.md"
requires-python = ">=3.12,<3.13"
authors = [{ name = "Charles Ponti" }]

dependencies = [
    # --- Cross-platform data + config stack ---
    # transformers: HuggingFace library for loading pretrained models like Gemma 3.
    # Kept in the base install because tokenizers/config tooling is useful in dev environments
    # even when the Apple-only runtime stack is not installed.
    "transformers>=4.49.0",

    # datasets: HuggingFace library for loading and processing training data.
    "datasets>=3.0.0",

    # sentencepiece: tokenizer library required by Gemma's tokenizer.
    "sentencepiece>=0.2.0",

    # --- Config & validation ---
    # pydantic: runtime type validation. All our YAML configs are validated through
    # Pydantic models so you get clear errors when something is misconfigured.
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",

    # --- CLI & terminal output ---
    "typer>=0.12.5",
    "rich>=13.0",

    # --- Experiment tracking ---
    # wandb: Weights & Biases — industry-standard tool for logging training metrics,
    # comparing runs, and visualising model performance over time.
    "wandb>=0.19.0",

    # --- Utilities ---
    "tqdm>=4.64",
    "numpy>=1.26",
    "httpx>=0.28.0",
]

[project.optional-dependencies]
apple = [
    # Full Apple Silicon runtime stack: training + inference.
    # If uv fails to resolve torch on a newer macOS (e.g. macOS 26+), install
    # the apple-runtime packages manually via pip instead of uv:
    #   .venv/bin/pip install torch accelerate peft trl mlx mlx-lm
    "torch>=2.4.0",
    "accelerate>=1.0.0",
    "peft>=0.14.0",
    "trl>=0.12.0",
    "mlx>=0.22.0",
    "mlx-lm>=0.20.0",
]
mlx = [
    # MLX-only subset — inference and serving without the full PyTorch training stack.
    # Useful for running experiments when you only need local inference (not fine-tuning).
    # This resolves cleanly on all macOS versions via pip:
    #   .venv/bin/pip install mlx mlx-lm
    "mlx>=0.22.0",
    "mlx-lm>=0.20.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8.0",
    "pyright>=1.1.390",
]
notebook = [
    "jupyter>=1.0",
    "ipywidgets>=8.0",
    "matplotlib>=3.8",
    "pandas>=2.0",
    "seaborn>=0.13",
]

[project.scripts]
nexus = "nexus.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus"]

[tool.hatch.build]
sources = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.12"
pythonPlatform = "Darwin"
venvPath = "."
venv = ".venv"
include = ["src"]
typeCheckingMode = "standard"

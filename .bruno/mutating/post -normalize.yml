info:
  name: post /normalize
  type: http
  seq: 11
  tags:
    - mutating

http:
  method: POST
  url: "{{baseUrl}}/normalize"
  body:
    type: json
    data: |-
      {
        "source_id": "variety"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Row counts by table
    request:
      url: "{{baseUrl}}/normalize"
      method: POST
      body:
        type: json
        data: |-
          {
            "source_id": "variety"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 500 Response
    description: Normalization failed
    request:
      url: "{{baseUrl}}/normalize"
      method: POST
      body:
        type: json
        data: |-
          {
            "source_id": "variety"
          }
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "",
            "detail": ""
          }

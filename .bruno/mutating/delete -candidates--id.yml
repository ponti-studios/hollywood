    description: Deleted successfully
    request:
      url: "{{baseUrl}}/candidates/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Candidate not found
    request:
      url: "{{baseUrl}}/candidates/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "",
            "detail": ""
          }

info:
  name: delete /candidates/:id
  type: http
  seq: 3
  tags:
    - mutating

http:
  method: DELETE
  url: "{{baseUrl}}/candidates/:id"
  params:
    - name: id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
